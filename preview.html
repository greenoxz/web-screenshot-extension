<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Screenshot Preview</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=crop,download">
    <link rel="stylesheet" href="preview.css">
  </head>
  <body>
    <header class="toolbar">
      <div>
        <h1>Screenshot Preview</h1>
        <p id="imageInfo">Loading image...</p>
      </div>

      <div class="actions">
        <div class="zoom-controls" aria-label="Preview zoom controls">
          <button id="fitButton" type="button">Fit</button>
          <button id="zoomOutButton" type="button">-</button>
          <select id="zoomSelect" aria-label="Preview zoom">
            <option value="0.25">25%</option>
            <option value="0.5">50%</option>
            <option value="0.75">75%</option>
            <option value="1">100%</option>
            <option value="1.25">125%</option>
            <option value="1.5">150%</option>
            <option value="2">200%</option>
          </select>
          <button id="zoomInButton" type="button">+</button>
        </div>
        <label class="format-control" for="saveFormatSelect">
          <span>Format</span>
          <select id="saveFormatSelect" aria-label="Save format">
            <option value="png">PNG</option>
            <option value="jpeg">JPEG</option>
            <option value="webp">WebP</option>
          </select>
        </label>
        <button id="cropButton" class="icon-button" type="button" aria-label="Crop" title="Crop">
          <span class="material-symbols-outlined" aria-hidden="true">crop</span>
        </button>
        <button id="resetButton" type="button" disabled>Reset crop</button>
        <button id="downloadOriginalButton" class="text-icon-button" type="button">
          <span class="material-symbols-outlined" aria-hidden="true">download</span>
          <span>Full</span>
        </button>
        <button id="downloadCropButton" class="primary text-icon-button" type="button" disabled>
          <span class="material-symbols-outlined" aria-hidden="true">download</span>
          <span>Crop</span>
        </button>
      </div>
    </header>

    <main class="workspace">
      <div id="stage" class="stage">
        <img id="previewImage" alt="Full page screenshot preview">
        <div id="cropBox" class="crop-box" aria-hidden="true">
          <span class="handle nw" data-handle="nw"></span>
          <span class="handle ne" data-handle="ne"></span>
          <span class="handle sw" data-handle="sw"></span>
          <span class="handle se" data-handle="se"></span>
        </div>
      </div>
    </main>

    <script src="preview.js"></script>
  </body>
</html>
